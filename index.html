<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>五月天附中模擬器｜五模型支援</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(ellipse at 20% 30%, #0a1a2e, #040a14);
            font-family: -apple-system, 'Segoe UI', 'Noto Sans TC', sans-serif;
            padding: 16px;
            min-height: 100vh;
        }
        .game-container { max-width: 950px; margin: 0 auto; }
        .glass-card {
            background: rgba(15, 30, 50, 0.7);
            backdrop-filter: blur(14px);
            border-radius: 28px;
            border: 1px solid rgba(70, 140, 210, 0.4);
            padding: 16px;
            margin-bottom: 16px;
        }
        h3 {
            color: #b0d4ff;
            font-size: 1rem;
            font-weight: 600;
            border-left: 3px solid #4a9eff;
            padding-left: 12px;
            margin-bottom: 12px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            color: #b8d0e8;
            font-size: 13px;
        }
        .stat-value {
            background: rgba(0,0,0,0.4);
            padding: 2px 10px;
            border-radius: 20px;
            color: #8ac4ff;
        }
        .progress-bar {
            background: #1a2a4a;
            border-radius: 20px;
            height: 6px;
            margin: 8px 0;
        }
        .progress-fill {
            background: #4a9eff;
            width: 0%;
            height: 100%;
            border-radius: 20px;
        }
        .subject-table {
            width: 100%;
            font-size: 11px;
            border-collapse: collapse;
        }
        .subject-table th, .subject-table td {
            padding: 6px 4px;
            text-align: left;
            border-bottom: 1px solid rgba(70,130,200,0.2);
            color: #c0d8f0;
        }
        .danger { color: #ff6688; }
        .success { color: #88ffaa; }
        .chat-box {
            background: rgba(5,12,22,0.85);
            border-radius: 24px;
            padding: 16px;
            min-height: 280px;
            max-height: 350px;
            overflow-y: auto;
            color: #e0e8f5;
            font-size: 14px;
            line-height: 1.5;
        }
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
        }
        .action-btn {
            background: #1a3a60;
            border: 1px solid #4a8acf;
            border-radius: 40px;
            padding: 10px 12px;
            color: white;
            font-size: 13px;
            cursor: pointer;
            flex: 1;
            text-align: center;
        }
        .free-input {
            display: flex;
            gap: 8px;
            margin: 10px 0;
        }
        .free-input input {
            flex: 1;
            background: #0f1422;
            border: 1px solid #2a5a8a;
            border-radius: 40px;
            padding: 10px;
            color: white;
        }
        .free-input button, .save-load-bar button {
            background: #1a3a60;
            border: none;
            border-radius: 40px;
            padding: 0 18px;
            color: white;
            cursor: pointer;
        }
        .save-load-bar {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 12px;
        }
        .create-panel input, .create-panel select, .create-panel textarea {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
            background: #0f1422;
            border: 1px solid #2a5a8a;
            border-radius: 24px;
            color: white;
        }
        .create-panel button {
            background: #1a3a60;
            border: none;
            border-radius: 40px;
            padding: 12px;
            color: white;
            width: 100%;
            margin-top: 12px;
            cursor: pointer;
        }
        .hidden { display: none; }
        .inline-hint { font-size: 11px; color: #6a90b0; text-align: center; margin-top: 8px; }
        .error-msg { color: #ff8888; font-size: 12px; margin-top: 8px; }
        .club-badge { background: #1a3a60; border-radius: 20px; padding: 2px 10px; font-size: 11px; display: inline-block; }
        select, input { font-size: 14px; }
    </style>
</head>
<body>
<div class="game-container" id="gameContainer">
    <!-- 創角畫面 -->
    <div id="createPanel" class="glass-card create-panel">
        <h2 style="text-align:center; color:#c0e0ff;">🎸 五月天附中模擬器</h2>
        <input type="text" id="playerName" placeholder="你的名字" value="同學">
        <select id="gameYear">
            <option value="1991">1991年入學（阿信怪獸同屆）</option>
            <option value="1992">1992年入學（阿信怪獸高二，瑪莎石頭高一）</option>
            <option value="1993">1993年入學（怪獸高三，阿信瑪莎石頭高二）</option>
        </select>
        <select id="playerGrade"><option value="高一">高一</option><option value="高二">高二</option><option value="高三">高三</option></select>
        <select id="playerSchool"><option value="附中">師大附中</option><option value="友校">友校</option></select>
        <select id="playerClub">
            <option value="吉他社">🎸 吉他社</option>
            <option value="熱音社">🎤 熱音社</option>
            <option value="熱舞社">💃 熱舞社</option>
            <option value="漫研社">📚 漫研社</option>
            <option value="攝影社">📷 攝影社</option>
            <option value="電影社">🎬 電影社</option>
            <option value="籃球社">🏀 籃球社</option>
            <option value="羽球社">🏸 羽球社</option>
            <option value="桌遊社">🎲 桌遊社</option>
            <option value="學生會">📋 學生會</option>
        </select>
        <select id="initialRelation">
            <option value="陌生人">完全不認識</option>
            <option value="聽過名字">聽過名字</option>
            <option value="點頭之交">點頭之交</option>
        </select>
        <textarea id="playerPersonality" placeholder="自訂人設（性格、喜好、夢想）" rows="2"></textarea>
        <button id="startGameBtn">✨ 開始附中生活</button>
        <div class="inline-hint">⚡ 支援 Gemini / OpenAI / Claude / DeepSeek / Grok</div>
    </div>

    <!-- 遊戲主畫面 -->
    <div id="gamePanel" class="hidden">
        <!-- API 設定區 -->
        <div class="glass-card">
            <div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px;">
                <select id="modelSelect" style="background:#0f1422; border:1px solid #2a5a8a; border-radius:40px; padding:8px; color:white; flex:1;">
                    <option value="gemini">🇺🇸 Gemini (Google)</option>
                    <option value="openai">🇺🇸 OpenAI (GPT)</option>
                    <option value="claude">🇺🇸 Claude (Anthropic)</option>
                    <option value="deepseek">🇨🇳 DeepSeek</option>
                    <option value="grok">🇺🇸 Grok (xAI)</option>
                </select>
                <input type="password" id="apiKeyInput" placeholder="貼上 API Key" style="flex:2; background:#0f1422; border:1px solid #2a5a8a; border-radius:40px; padding:8px; color:white;">
                <button id="saveApiBtn">儲存</button>
                <button id="testApiBtn">測試</button>
            </div>
            <div id="apiStatus" style="font-size:11px; color:#6a90b0;">⚪ 未設定 API Key</div>
        </div>

        <!-- 數值面板 -->
        <div class="glass-card">
            <div class="stat-row"><span>⚡ 活力值</span><span class="stat-value" id="vitality">85</span></div>
            <div class="stat-row"><span>📚 課業壓力</span><span class="stat-value" id="pressure">40</span></div>
            <div class="stat-row"><span>🎵 吉他社親密度</span><span class="stat-value" id="clubIntimacy">5</span></div>
            <div class="stat-row"><span>🔄 回合進度</span><span class="stat-value" id="turnCount">0 / 25552</span></div>
            <div class="progress-bar"><div class="progress-fill" id="turnProgress"></div></div>
            <div class="stat-row"><span>❤️ 好感度</span><span>阿信<span id="ashinLike">0</span> 怪獸<span id="monsterLike">0</span> 瑪莎<span id="masaLike">0</span> 石頭<span id="stoneLike">0</span></span></div>
            <div class="stat-row"><span>🎯 我的社團</span><span class="stat-value" id="myClub">-</span></div>
            <div class="stat-row"><span>🗓️ 時間</span><span class="stat-value" id="gameDateText">1991年秋</span></div>
        </div>

        <!-- 學科面板 -->
        <div class="glass-card" id="creditsPanel">
            <h3>📖 學年戰報</h3>
            <div style="overflow-x:auto;">
                <table class="subject-table" id="subjectTable">
                    <thead><tr><th>科目</th><th>上學期</th><th>下學期</th><th>平均</th><th>平時</th><th>學分</th><th>缺課</th></tr></thead>
                    <tbody id="subjectTableBody"></tbody>
                </table>
            </div>
            <div class="stat-row"><span>🏆 已取得學分</span><span class="stat-value" id="earnedCredit">0 / 28</span></div>
            <div class="stat-row"><span id="retainWarn" style="color:#88ffaa;">✅ 學分安全</span></div>
        </div>

        <!-- 成發面板（隱藏） -->
        <div class="glass-card" id="performancePanel" style="display:none;">
            <h3>🎤 成發進度</h3>
            <div class="stat-row"><span>📅 下次驗收</span><span class="stat-value" id="nextCheck">第2週末</span></div>
            <div id="songsList" style="font-size:13px; color:#c0d8f0;"></div>
            <div class="progress-bar"><div class="progress-fill" id="practiceProgress"></div></div>
        </div>

        <!-- 對話區 -->
        <div class="chat-box" id="storyLog"></div>

        <div class="action-buttons">
            <button class="action-btn" data-action="A">🎸 吉他社辦</button>
            <button class="action-btn" data-action="B">🎨 找阿信</button>
            <button class="action-btn" data-action="C">📖 教室上課</button>
            <button class="action-btn" data-action="D">☕ 福利社</button>
            <button class="action-btn" data-action="E">✏️ 自由</button>
        </div>
        <div class="free-input">
            <input type="text" id="freeText" placeholder="輸入自由行動...">
            <button id="submitFree">送出</button>
        </div>
        <div class="save-load-bar">
            <button id="saveBtn">💾 存檔</button>
            <button id="loadBtn">📀 讀檔</button>
            <button id="resetBtn">🔄 重置</button>
        </div>
        <div id="errorMsg" class="error-msg"></div>
    </div>
</div>

<script>
    // ==================== 歌曲池 ====================
    const songPool = [
        "浪人情歌", "愛情的盡頭", "挪威的森林", "It's My Life", "Livin' On A Prayer",
        "Sweet Child O' Mine", "Welcome to the Jungle", "Hey Jude", "Let It Be", "Hotel California",
        "Smells Like Teen Spirit", "大海", "我的未來不是夢", "如果還有明天", "向前走",
        "一場遊戲一場夢", "新不了情", "Bohemian Rhapsody"
    ];

    // 需驗社的大社
    const needAuditionClubs = ["吉他社", "熱音社", "熱舞社"];

    // ==================== 學科資料 ====================
    let subjects = [
        { name:"國文", credit:4, score1:0, score2:0, daily1:0, daily2:0, abs1:0, abs2:0, totalClass:68, threshold:22 },
        { name:"英文", credit:4, score1:0, score2:0, daily1:0, daily2:0, abs1:0, abs2:0, totalClass:68, threshold:22 },
        { name:"數學", credit:4, score1:0, score2:0, daily1:0, daily2:0, abs1:0, abs2:0, totalClass:68, threshold:22 },
        { name:"歷史", credit:2, score1:0, score2:0, daily1:0, daily2:0, abs1:0, abs2:0, totalClass:34, threshold:11 },
        { name:"地理", credit:2, score1:0, score2:0, daily1:0, daily2:0, abs1:0, abs2:0, totalClass:34, threshold:11 },
        { name:"公民", credit:2, score1:0, score2:0, daily1:0, daily2:0, abs1:0, abs2:0, totalClass:34, threshold:11 },
        { name:"物理", credit:2, score1:0, score2:0, daily1:0, daily2:0, abs1:0, abs2:0, totalClass:34, threshold:11 },
        { name:"化學", credit:2, score1:0, score2:0, daily1:0, daily2:0, abs1:0, abs2:0, totalClass:34, threshold:11 },
        { name:"生物", credit:2, score1:0, score2:0, daily1:0, daily2:0, abs1:0, abs2:0, totalClass:34, threshold:11 },
        { name:"地科", credit:2, score1:0, score2:0, daily1:0, daily2:0, abs1:0, abs2:0, totalClass:34, threshold:11 },
        { name:"美術", credit:1, score1:0, score2:0, daily1:0, daily2:0, abs1:0, abs2:0, totalClass:17, threshold:5 },
        { name:"音樂", credit:1, score1:0, score2:0, daily1:0, daily2:0, abs1:0, abs2:0, totalClass:17, threshold:5 },
        { name:"體育", credit:2, score1:0, score2:0, daily1:0, daily2:0, abs1:0, abs2:0, totalClass:34, threshold:11 },
        { name:"資訊", credit:2, score1:0, score2:0, daily1:0, daily2:0, abs1:0, abs2:0, totalClass:34, threshold:11 },
        { name:"國防", credit:1, score1:0, score2:0, daily1:0, daily2:0, abs1:0, abs2:0, totalClass:17, threshold:5 }
    ];

    // ==================== 遊戲狀態 ====================
    let gameState = {
        vitality: 85, pressure: 40, clubIntimacy: 5,
        ashinLike: 5, monsterLike: 5, masaLike: 5, stoneLike: 5,
        turn: 0, week: 1, semester: "上", academicYear: 1991, gradeLevel: 1,
        gameDateText: "1991年 秋", year: 1991,
        isGraduated: false, isAuditioned: false,  // 是否通過驗社
        subjects: JSON.parse(JSON.stringify(subjects)),
        songs: [],  // 成發歌曲
        lastPracticeWeek: 0
    };
    
    let playerConfig = {
        name: "同學", gameYear: 1991, playerGrade: "高一", school: "附中", club: "吉他社", relation: "陌生人", personality: ""
    };
    
    let apiKey = localStorage.getItem("api_key") || "";
    let currentModel = localStorage.getItem("ai_model") || "gemini";
    
    // ==================== 五種模型 API 設定 ====================
    const API_CONFIG = {
        gemini: {
            name: "Gemini",
            url: (key) => `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,
            headers: () => ({ "Content-Type": "application/json" }),
            buildBody: (prompt, sys) => ({ contents: [{ parts: [{ text: sys + "\n\n" + prompt }] }], generationConfig: { temperature: 0.75, maxOutputTokens: 800 } }),
            parse: (data) => data.candidates?.[0]?.content?.parts?.[0]?.text || ""
        },
        openai: {
            name: "OpenAI",
            url: () => "https://api.openai.com/v1/chat/completions",
            headers: (key) => ({ "Content-Type": "application/json", "Authorization": `Bearer ${key}` }),
            buildBody: (prompt, sys) => ({ model: "gpt-3.5-turbo", messages: [{ role: "system", content: sys }, { role: "user", content: prompt }], temperature: 0.75, max_tokens: 800 }),
            parse: (data) => data.choices?.[0]?.message?.content || ""
        },
        claude: {
            name: "Claude",
            url: () => "https://api.anthropic.com/v1/messages",
            headers: (key) => ({ "Content-Type": "application/json", "x-api-key": key, "anthropic-version": "2023-06-01" }),
            buildBody: (prompt, sys) => ({ model: "claude-3-haiku-20240307", max_tokens: 800, temperature: 0.75, system: sys, messages: [{ role: "user", content: prompt }] }),
            parse: (data) => data.content?.[0]?.text || ""
        },
        deepseek: {
            name: "DeepSeek",
            url: () => "https://api.deepseek.com/v1/chat/completions",
            headers: (key) => ({ "Content-Type": "application/json", "Authorization": `Bearer ${key}` }),
            buildBody: (prompt, sys) => ({ model: "deepseek-chat", messages: [{ role: "system", content: sys }, { role: "user", content: prompt }], temperature: 0.75, max_tokens: 800 }),
            parse: (data) => data.choices?.[0]?.message?.content || ""
        },
        grok: {
            name: "Grok",
            url: () => "https://api.x.ai/v1/chat/completions",
            headers: (key) => ({ "Content-Type": "application/json", "Authorization": `Bearer ${key}` }),
            buildBody: (prompt, sys) => ({ model: "grok-beta", messages: [{ role: "system", content: sys }, { role: "user", content: prompt }], temperature: 0.75, max_tokens: 800 }),
            parse: (data) => data.choices?.[0]?.message?.content || ""
        }
    };
    
    // ==================== 輔助函數 ====================
    function updateUI() {
        document.getElementById("vitality").innerText = gameState.vitality;
        document.getElementById("pressure").innerText = gameState.pressure;
        document.getElementById("clubIntimacy").innerText = gameState.clubIntimacy;
        document.getElementById("ashinLike").innerText = gameState.ashinLike;
        document.getElementById("monsterLike").innerText = gameState.monsterLike;
        document.getElementById("masaLike").innerText = gameState.masaLike;
        document.getElementById("stoneLike").innerText = gameState.stoneLike;
        document.getElementById("turnCount").innerHTML = `${gameState.turn} / 25552`;
        document.getElementById("turnProgress").style.width = (gameState.turn / 25552 * 100) + "%";
        document.getElementById("gameDateText").innerHTML = gameState.gameDateText;
        document.getElementById("myClub").innerHTML = playerConfig.club + (needAuditionClubs.includes(playerConfig.club) && !gameState.isAuditioned ? " (未驗社)" : "");
        
        // 更新學分面板
        let total = 0, earned = 0;
        let tbody = "";
        for(let s of gameState.subjects) {
            let avg = (s.score1 + s.score2) / 2;
            let isPass = avg >= 60;
            total += s.credit;
            if(isPass) earned += s.credit;
            let absTotal = s.abs1 + s.abs2;
            let absWarn = absTotal >= s.threshold ? `<span class="danger">${absTotal}/${s.totalClass}</span>` : `${absTotal}/${s.totalClass}`;
            tbody += `<tr><td>${s.name}</td><td>${s.score1||0}</td><td>${s.score2||0}</td><td class="${isPass?'success':'danger'}">${avg.toFixed(1)}</td><td>${((s.daily1+s.daily2)/2).toFixed(1)}</td><td>${s.credit}</td><td>${absWarn}</td></tr>`;
        }
        document.getElementById("subjectTableBody").innerHTML = tbody;
        document.getElementById("earnedCredit").innerHTML = `${earned} / ${total}`;
        let isRetain = earned < total/2;
        document.getElementById("retainWarn").innerHTML = isRetain ? "<span class='danger'>⚠️ 學分未達一半，留級邊緣！</span>" : "✅ 學分安全";
        
        // 更新成發面板
        if(gameState.songs.length > 0) {
            document.getElementById("performancePanel").style.display = "block";
            let html = "";
            let totalProgress = 0;
            for(let s of gameState.songs) {
                html += `<div class="stat-row"><span>${s.name}</span><span>${s.progress}%</span></div>`;
                totalProgress += s.progress;
            }
            document.getElementById("songsList").innerHTML = html;
            let avg = totalProgress / gameState.songs.length;
            document.getElementById("practiceProgress").style.width = avg + "%";
        }
    }
    
    function addTurn() {
        gameState.turn++;
        gameState.week = Math.floor(gameState.turn / 10) + 1;
        updateUI();
        
        // 每兩週成發驗收
        if(gameState.week % 2 === 0 && gameState.week !== gameState.lastPracticeWeek && gameState.songs.length > 0) {
            gameState.lastPracticeWeek = gameState.week;
            let failed = gameState.songs.filter(s => s.progress < 60).length;
            if(failed > 0) {
                document.getElementById("storyLog").innerHTML += `<br><br>📢 成發驗收！${failed}首歌未達60%，社團關切！`;
                for(let s of gameState.songs) if(s.progress < 60) s.progress = Math.max(0, s.progress - 5);
                updateUI();
            }
        }
        
        if(gameState.turn >= 25552 && !gameState.isGraduated) {
            gameState.isGraduated = true;
            document.getElementById("storyLog").innerHTML += "<br><br>🎓 恭喜完成 25552 回合！你畢業了！";
        }
    }
    
    // 觸發成發討論
    function triggerPerformanceDiscussion() {
        if(gameState.songs.length > 0) return;
        let shuffled = [...songPool];
        for(let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        let selected = shuffled.slice(0, 4);
        gameState.songs = selected.map(name => ({ name: name, progress: 0 }));
        updateUI();
        document.getElementById("storyLog").innerHTML += `<br><br>🎤 吉他社成發討論：大家決定唱這四首歌！<br>${selected.map(s => `🎵 ${s}`).join("<br>")}`;
    }
    
    // 檢查是否能去吉他社辦
    function canAccessGuitarClub() {
        if(playerConfig.club === "吉他社" && gameState.isAuditioned) return "full";
        let knowsMember = (playerConfig.relation !== "陌生人") || (gameState.ashinLike >= 10) || (gameState.clubIntimacy >= 15);
        if(knowsMember) return "limited";
        return "denied";
    }
    
    // ==================== AI 呼叫 ====================
    async function callAI(userInput) {
        if(!apiKey) {
            document.getElementById("errorMsg").innerHTML = "❌ 請先設定 API Key";
            return false;
        }
        
        const cfg = API_CONFIG[currentModel];
        if(!cfg) {
            document.getElementById("errorMsg").innerHTML = "❌ 不支援的模型";
            return false;
        }
        
        const systemPrompt = `你是【五月天附中模擬器】的主持人。玩家叫${playerConfig.name}，${playerConfig.gameYear}年入學，${playerConfig.playerGrade}，${playerConfig.school}，社團：${playerConfig.club}，與角色關係：${playerConfig.relation}。自訂人設：${playerConfig.personality}。請用繁體中文生成附中校園日常劇情，最後輸出JSON格式：{"storyText":"劇情內容","vitalityChange":0,"pressureChange":0,"ashinLikeChange":0,"monsterLikeChange":0,"masaLikeChange":0,"stoneLikeChange":0,"clubIntimacyChange":0}`;
        
        const prompt = `當前活力:${gameState.vitality} 壓力:${gameState.pressure} 吉他社親密度:${gameState.clubIntimacy} 好感:阿信${gameState.ashinLike} 怪獸${gameState.monsterLike} 瑪莎${gameState.masaLike} 石頭${gameState.stoneLike}。玩家行動：${userInput}。請生成劇情並根據劇情合理調整數值。`;
        
        try {
            document.getElementById("errorMsg").innerHTML = "⏳ AI 思考中...";
            
            const response = await fetch(cfg.url(apiKey), {
                method: "POST",
                headers: cfg.headers(apiKey),
                body: JSON.stringify(cfg.buildBody(prompt, systemPrompt))
            });
            
            if(!response.ok) {
                const errorText = await response.text();
                throw new Error(`API錯誤 ${response.status}: ${errorText.substring(0,100)}`);
            }
            
            const data = await response.json();
            let rawText = cfg.parse(data);
            
            let jsonMatch = rawText.match(/\{[\s\S]*\}/);
            if(jsonMatch) {
                let parsed = JSON.parse(jsonMatch[0]);
                let story = parsed.storyText || "（劇情生成中）";
                
                gameState.vitality = Math.min(100, Math.max(0, gameState.vitality + (parsed.vitalityChange || 0)));
                gameState.pressure = Math.min(100, Math.max(0, gameState.pressure + (parsed.pressureChange || 0)));
                gameState.clubIntimacy = Math.min(100, Math.max(0, gameState.clubIntimacy + (parsed.clubIntimacyChange || 0)));
                gameState.ashinLike = Math.min(100, Math.max(0, gameState.ashinLike + (parsed.ashinLikeChange || 0)));
                gameState.monsterLike = Math.min(100, Math.max(0, gameState.monsterLike + (parsed.monsterLikeChange || 0)));
                gameState.masaLike = Math.min(100, Math.max(0, gameState.masaLike + (parsed.masaLikeChange || 0)));
                gameState.stoneLike = Math.min(100, Math.max(0, gameState.stoneLike + (parsed.stoneLikeChange || 0)));
                
                document.getElementById("storyLog").innerHTML += `<br><br>🎭 ${story}`;
                document.getElementById("storyLog").scrollTop = document.getElementById("storyLog").scrollHeight;
                updateUI();
                addTurn();
                document.getElementById("errorMsg").innerHTML = "";
                return true;
            } else {
                throw new Error("AI 回傳格式錯誤");
            }
        } catch(e) {
            document.getElementById("errorMsg").innerHTML = `❌ ${e.message}`;
            console.error(e);
            return false;
        }
    }
    
    async function testAPI() {
        if(!apiKey) {
            document.getElementById("errorMsg").innerHTML = "❌ 請先設定 API Key";
            return;
        }
        const cfg = API_CONFIG[currentModel];
        document.getElementById("errorMsg").innerHTML = `⏳ 測試連線 ${cfg.name}...`;
        try {
            const response = await fetch(cfg.url(apiKey), { method: "GET", headers: cfg.headers(apiKey) });
            if(response.ok || response.status === 400) {
                document.getElementById("errorMsg").innerHTML = `✅ ${cfg.name} 連線成功！`;
            } else {
                document.getElementById("errorMsg").innerHTML = `❌ ${cfg.name} 連線失敗：${response.status}`;
            }
        } catch(e) {
            document.getElementById("errorMsg").innerHTML = `❌ 連線錯誤：${e.message}`;
        }
    }
    
    // ==================== 事件綁定 ====================
    function saveApi() {
        currentModel = document.getElementById("modelSelect").value;
        apiKey = document.getElementById("apiKeyInput").value.trim();
        if(apiKey) {
            localStorage.setItem("ai_model", currentModel);
            localStorage.setItem("api_key", apiKey);
            document.getElementById("apiStatus").innerHTML = `✅ ${API_CONFIG[currentModel].name} Key 已儲存`;
            document.getElementById("errorMsg").innerHTML = "";
        } else {
            document.getElementById("errorMsg").innerHTML = "請輸入有效的 API Key";
        }
    }
    
    function startGame() {
        playerConfig.name = document.getElementById("playerName").value || "同學";
        playerConfig.gameYear = parseInt(document.getElementById("gameYear").value);
        playerConfig.playerGrade = document.getElementById("playerGrade").value;
        playerConfig.school = document.getElementById("playerSchool").value;
        playerConfig.club = document.getElementById("playerClub").value;
        playerConfig.relation = document.getElementById("initialRelation").value;
        playerConfig.personality = document.getElementById("playerPersonality").value;
        
        gameState.year = playerConfig.gameYear;
        gameState.academicYear = playerConfig.gameYear;
        gameState.gradeLevel = { "高一":1, "高二":2, "高三":3 }[playerConfig.playerGrade] || 1;
        gameState.gameDateText = `${playerConfig.gameYear}年 秋（${playerConfig.playerGrade}）`;
        
        // 大社需要驗社
        if(needAuditionClubs.includes(playerConfig.club)) {
            gameState.isAuditioned = false;
        } else {
            gameState.isAuditioned = true;
        }
        
        // 初始關係影響好感度
        let baseLike = { "陌生人":0, "聽過名字":3, "點頭之交":6 }[playerConfig.relation];
        gameState.ashinLike = baseLike;
        gameState.monsterLike = baseLike;
        gameState.masaLike = playerConfig.gameYear >= 1992 ? baseLike : 0;
        gameState.stoneLike = playerConfig.gameYear >= 1992 ? baseLike : 0;
        
        document.getElementById("createPanel").classList.add("hidden");
        document.getElementById("gamePanel").classList.remove("hidden");
        updateUI();
        
        document.getElementById("storyLog").innerHTML = `🎸 國立臺灣師範大學附屬高級中學\n\n${playerConfig.gameYear}年，九月。紅磚牆、椰子樹。你站在穿堂下。\n\n「讓一下。」一個揹吉他的男生走過去。\n\n你的附中故事，開始了。`;
    }
    
    async function handleAction(code, freeText = null) {
        let input = "";
        if(code === 'A') {
            let access = canAccessGuitarClub();
            if(access === "denied") {
                document.getElementById("storyLog").innerHTML += "<br><br>🚫 你不是吉他社的，被學長姐擋在門外。";
                addTurn();
                return;
            } else if(access === "limited") {
                input = "去吉他社辦（非社員，偶爾去看看）";
            } else {
                input = "去吉他社辦";
                if(playerConfig.club === "吉他社" && gameState.songs.length === 0 && !gameState.isGraduated) {
                    triggerPerformanceDiscussion();
                }
            }
        } else if(code === 'B') input = "去找阿信";
        else if(code === 'C') input = "去教室上課";
        else if(code === 'D') input = "去福利社";
        else if(code === 'E' && freeText) input = freeText;
        else if(code === 'E') return;
        await callAI(input);
    }
    
    document.getElementById("startGameBtn").onclick = startGame;
    document.getElementById("saveApiBtn").onclick = saveApi;
    document.getElementById("testApiBtn").onclick = testAPI;
    document.getElementById("saveBtn").onclick = () => { localStorage.setItem("game_save", JSON.stringify({gameState, playerConfig})); alert("存檔完成"); };
    document.getElementById("loadBtn").onclick = () => { let s = localStorage.getItem("game_save"); if(s) { let d=JSON.parse(s); gameState=d.gameState; playerConfig=d.playerConfig; updateUI(); document.getElementById("storyLog").innerHTML="📀 讀取存檔完成"; } else alert("無存檔"); };
    document.getElementById("resetBtn").onclick = () => { if(confirm("重置遊戲？")) location.reload(); };
    document.getElementById("submitFree").onclick = () => {
        let txt = document.getElementById("freeText").value.trim();
        if(txt) handleAction('E', txt);
        document.getElementById("freeText").value = "";
    };
    document.querySelectorAll(".action-btn").forEach(btn => {
        btn.onclick = () => { let act = btn.getAttribute("data-action"); handleAction(act, null); };
    });
    
    if(apiKey) document.getElementById("apiKeyInput").value = "********";
    if(currentModel) document.getElementById("modelSelect").value = currentModel;
    updateUI();
</script>
</body>
</html>
