<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>五月天附中模擬器｜動態選項版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(ellipse at 20% 30%, #0a1a2e, #040a14);
            font-family: -apple-system, 'Segoe UI', 'Noto Sans TC', sans-serif;
            padding: 16px;
            min-height: 100vh;
        }
        .game-container { max-width: 550px; margin: 0 auto; }
        .glass-card {
            background: rgba(15, 30, 50, 0.7);
            backdrop-filter: blur(14px);
            border-radius: 28px;
            border: 1px solid rgba(70, 140, 210, 0.4);
            padding: 16px;
            margin-bottom: 16px;
        }
        h3 {
            color: #b0d4ff;
            font-size: 0.9rem;
            font-weight: 600;
            border-left: 3px solid #4a9eff;
            padding-left: 12px;
            margin-bottom: 12px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            color: #b8d0e8;
            font-size: 14px;
        }
        .stat-value {
            background: rgba(0,0,0,0.4);
            padding: 4px 12px;
            border-radius: 20px;
            color: #8ac4ff;
            font-weight: 600;
        }
        .progress-bar {
            background: #1a2a4a;
            border-radius: 20px;
            height: 6px;
            margin: 10px 0;
        }
        .progress-fill {
            background: #4a9eff;
            width: 0%;
            height: 100%;
            border-radius: 20px;
        }
        .goodness-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 12px 0;
            background: rgba(10,20,40,0.4);
            padding: 10px;
            border-radius: 20px;
        }
        .goodness-item {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #b8d4fc;
        }
        .goodness-item span:last-child {
            background: #0c1220;
            padding: 2px 10px;
            border-radius: 20px;
            color: #80b0ff;
        }
        .chat-box {
            background: rgba(5,12,22,0.85);
            border-radius: 24px;
            padding: 16px;
            min-height: 250px;
            max-height: 320px;
            overflow-y: auto;
            color: #e0e8f5;
            font-size: 14px;
            line-height: 1.5;
        }
        .action-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 12px 0;
        }
        .action-btn {
            background: #1a3a60;
            border: 1px solid #4a8acf;
            border-radius: 40px;
            padding: 10px 8px;
            color: white;
            font-size: 12px;
            cursor: pointer;
            text-align: center;
            word-break: break-word;
        }
        .free-input {
            display: flex;
            gap: 8px;
            margin: 12px 0;
        }
        .free-input input {
            flex: 1;
            background: #0f1422;
            border: 1px solid #2a5a8a;
            border-radius: 40px;
            padding: 12px;
            color: white;
            font-size: 14px;
        }
        .free-input button {
            background: #1a3a60;
            border: none;
            border-radius: 40px;
            padding: 0 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .save-load-bar {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 12px;
        }
        .save-load-bar button {
            background: #2d2a1a;
            border: 1px solid #b9a45c;
            border-radius: 30px;
            padding: 6px 14px;
            color: #ffe2b5;
            font-size: 11px;
            cursor: pointer;
        }
        .create-panel input, .create-panel select, .create-panel textarea {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
            background: #0f1422;
            border: 1px solid #2a5a8a;
            border-radius: 24px;
            color: white;
        }
        .create-panel textarea { min-height: 70px; resize: vertical; }
        .create-panel button {
            background: #1a3a60;
            border: none;
            border-radius: 40px;
            padding: 12px;
            color: white;
            width: 100%;
            margin-top: 12px;
            cursor: pointer;
        }
        .hidden { display: none; }
        .inline-hint { font-size: 11px; color: #6a90b0; text-align: center; margin-top: 8px; }
        .error-msg { color: #ff8888; font-size: 12px; margin-top: 8px; }
        .dynamic-content { color: #c0d8f0; font-size: 13px; }
    </style>
</head>
<body>
<div class="game-container" id="gameContainer">
    <!-- 創角畫面 -->
    <div id="createPanel" class="glass-card create-panel">
        <h2 style="text-align:center; color:#c0e0ff;">🎸 五月天附中模擬器</h2>
        <input type="text" id="playerName" placeholder="你的名字" value="同學">
        <select id="gameYear">
            <option value="1991">1991年入學</option>
            <option value="1992">1992年入學</option>
            <option value="1993">1993年入學</option>
        </select>
        <select id="playerGrade"><option value="高一">高一</option><option value="高二">高二</option><option value="高三">高三</option></select>
        <select id="playerSchool"><option value="附中">師大附中</option><option value="友校">友校</option></select>
        <select id="playerClub">
            <option value="吉他社">吉他社</option>
            <option value="熱音社">熱音社</option>
            <option value="熱舞社">熱舞社</option>
            <option value="其他社團">其他社團</option>
        </select>
        <select id="initialRelation"><option value="陌生人">完全不認識</option><option value="聽過名字">聽過名字</option><option value="點頭之交">點頭之交</option></select>
        <textarea id="playerPersonality" placeholder="自訂人設（性格、喜好、夢想）" rows="2"></textarea>
        <button id="startGameBtn">✨ 開始附中生活</button>
        <div class="inline-hint">⚡ 支援 Gemini / OpenAI / Claude / DeepSeek / Grok</div>
    </div>

    <!-- 遊戲主畫面 -->
    <div id="gamePanel" class="hidden">
        <!-- API 設定 -->
        <div class="glass-card">
            <div style="display:flex; flex-wrap:wrap; gap:8px;">
                <select id="modelSelect" style="background:#0f1422; border:1px solid #2a5a8a; border-radius:40px; padding:8px; color:white; flex:1;">
                    <option value="gemini">🇺🇸 Gemini</option>
                    <option value="openai">🇺🇸 OpenAI</option>
                    <option value="claude">🇺🇸 Claude</option>
                    <option value="deepseek">🇨🇳 DeepSeek</option>
                    <option value="grok">🇺🇸 Grok</option>
                </select>
                <input type="password" id="apiKeyInput" placeholder="API Key" style="flex:2; background:#0f1422; border:1px solid #2a5a8a; border-radius:40px; padding:8px; color:white;">
                <button id="saveApiBtn">儲存</button>
                <button id="testApiBtn">測試</button>
            </div>
            <div id="apiStatus" style="font-size:11px; color:#6a90b0; margin-top:6px;">⚪ 未設定</div>
        </div>

        <!-- 固定數值面板 -->
        <div class="glass-card">
            <div class="stat-row"><span>⚡ 活力值</span><span class="stat-value" id="vitality">85</span></div>
            <div class="stat-row"><span>📚 課業壓力</span><span class="stat-value" id="pressure">40</span></div>
            <div class="stat-row"><span>🎵 社團親密度</span><span class="stat-value" id="clubIntimacy">0</span></div>
            <div class="stat-row"><span>🔄 回合進度</span><span class="stat-value" id="turnCount">0 / 25552</span></div>
            <div class="progress-bar"><div class="progress-fill" id="turnProgress"></div></div>
            <div style="font-weight:500; margin:8px 0 4px;">❤️ 好感度</div>
            <div class="goodness-grid">
                <div class="goodness-item"><span>阿信</span><span id="ashinLike">0</span></div>
                <div class="goodness-item"><span>怪獸</span><span id="monsterLike">0</span></div>
                <div class="goodness-item"><span>瑪莎</span><span id="masaLike">0</span></div>
                <div class="goodness-item"><span>石頭</span><span id="stoneLike">0</span></div>
                <div class="goodness-item"><span>冠佑</span><span id="kuanLike">0</span></div>
            </div>
            <div class="stat-row"><span>📖 學年學分</span><span class="stat-value" id="creditInfo">0 / 28</span></div>
            <div class="stat-row"><span>📅 時間</span><span class="stat-value" id="gameDateText">1991年秋</span></div>
            <div class="stat-row"><span>🎯 社團</span><span class="stat-value" id="myClub">-</span></div>
        </div>

        <!-- 動態面板（AI 可顯示成發進度等） -->
        <div id="dynamicPanel" class="glass-card" style="display:none;">
            <h3 id="dynamicTitle">🎤 動態資訊</h3>
            <div id="dynamicContent" class="dynamic-content"></div>
        </div>

        <!-- 對話區 -->
        <div class="chat-box" id="storyLog"></div>

        <!-- A/B/C/D 動態選項按鈕 -->
        <div class="action-buttons" id="actionButtons">
            <button class="action-btn" id="actionA">A. 載入中...</button>
            <button class="action-btn" id="actionB">B. 載入中...</button>
            <button class="action-btn" id="actionC">C. 載入中...</button>
            <button class="action-btn" id="actionD">D. 載入中...</button>
        </div>

        <!-- E 自由行動 -->
        <div class="free-input">
            <input type="text" id="freeText" placeholder="E. 自由行動（輸入你想做的事）">
            <button id="submitFree">送出</button>
        </div>

        <!-- 存檔按鈕 -->
        <div class="save-load-bar">
            <button id="saveBtn">💾 存檔</button>
            <button id="loadBtn">📀 讀檔</button>
            <button id="resetBtn">🔄 重置</button>
        </div>
        <div id="errorMsg" class="error-msg"></div>
        <div id="memoryInfo" class="dynamic-content" style="font-size:11px; margin-top:8px;"></div>
    </div>
</div>

<script>
    // ==================== 遊戲狀態 ====================
    let gameState = {
        vitality: 85, pressure: 40, clubIntimacy: 0,
        ashinLike: 0, monsterLike: 0, masaLike: 0, stoneLike: 0, kuanLike: 0,
        turn: 0, academicYear: 1991, gradeLevel: 1, semester: "上",
        gameDateText: "1991年 秋", year: 1991,
        earnedCredit: 0, totalCredit: 28,
        isGraduated: false,
        memories: [],
        currentOptions: ["在校園逛逛", "去教室", "去福利社", "觀察四周"]
    };
    
    let playerConfig = {
        name: "同學", gameYear: 1991, playerGrade: "高一", school: "附中", club: "吉他社", relation: "陌生人", personality: ""
    };
    
    let apiKey = localStorage.getItem("api_key") || "";
    let currentModel = localStorage.getItem("ai_model") || "gemini";
    let lastMemoryTurn = 0;
    
    // API 設定
    const API_CONFIG = {
        gemini: {
            name: "Gemini",
            url: (key) => `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,
            headers: () => ({ "Content-Type": "application/json" }),
            buildBody: (prompt, sys) => ({ contents: [{ parts: [{ text: sys + "\n\n" + prompt }] }], generationConfig: { temperature: 0.8, maxOutputTokens: 1000 } }),
            parse: (data) => data.candidates?.[0]?.content?.parts?.[0]?.text || ""
        },
        deepseek: {
            name: "DeepSeek",
            url: () => "https://api.deepseek.com/v1/chat/completions",
            headers: (key) => ({ "Content-Type": "application/json", "Authorization": `Bearer ${key}` }),
            buildBody: (prompt, sys) => ({ model: "deepseek-chat", messages: [{ role: "system", content: sys }, { role: "user", content: prompt }], temperature: 0.8, max_tokens: 1000 }),
            parse: (data) => data.choices?.[0]?.message?.content || ""
        },
        openai: {
            name: "OpenAI",
            url: () => "https://api.openai.com/v1/chat/completions",
            headers: (key) => ({ "Content-Type": "application/json", "Authorization": `Bearer ${key}` }),
            buildBody: (prompt, sys) => ({ model: "gpt-3.5-turbo", messages: [{ role: "system", content: sys }, { role: "user", content: prompt }], temperature: 0.8, max_tokens: 1000 }),
            parse: (data) => data.choices?.[0]?.message?.content || ""
        },
        claude: {
            name: "Claude",
            url: () => "https://api.anthropic.com/v1/messages",
            headers: (key) => ({ "Content-Type": "application/json", "x-api-key": key, "anthropic-version": "2023-06-01" }),
            buildBody: (prompt, sys) => ({ model: "claude-3-haiku-20240307", max_tokens: 1000, temperature: 0.8, system: sys, messages: [{ role: "user", content: prompt }] }),
            parse: (data) => data.content?.[0]?.text || ""
        },
        grok: {
            name: "Grok",
            url: () => "https://api.x.ai/v1/chat/completions",
            headers: (key) => ({ "Content-Type": "application/json", "Authorization": `Bearer ${key}` }),
            buildBody: (prompt, sys) => ({ model: "grok-beta", messages: [{ role: "system", content: sys }, { role: "user", content: prompt }], temperature: 0.8, max_tokens: 1000 }),
            parse: (data) => data.choices?.[0]?.message?.content || ""
        }
    };
    
    // ==================== UI 更新 ====================
    function updateUI() {
        document.getElementById("vitality").innerText = gameState.vitality;
        document.getElementById("pressure").innerText = gameState.pressure;
        document.getElementById("clubIntimacy").innerText = gameState.clubIntimacy;
        document.getElementById("ashinLike").innerText = gameState.ashinLike;
        document.getElementById("monsterLike").innerText = gameState.monsterLike;
        document.getElementById("masaLike").innerText = gameState.masaLike;
        document.getElementById("stoneLike").innerText = gameState.stoneLike;
        document.getElementById("kuanLike").innerText = gameState.kuanLike;
        document.getElementById("turnCount").innerHTML = `${gameState.turn} / 25552`;
        document.getElementById("turnProgress").style.width = (gameState.turn / 25552 * 100) + "%";
        document.getElementById("gameDateText").innerHTML = gameState.gameDateText;
        document.getElementById("creditInfo").innerHTML = `${gameState.earnedCredit} / ${gameState.totalCredit}`;
        document.getElementById("myClub").innerHTML = playerConfig.club;
        document.getElementById("memoryInfo").innerHTML = `📝 已記錄 ${gameState.memories.length} 段回憶 | 每半年自動記錄`;
        
        // 更新按鈕文字
        document.getElementById("actionA").innerHTML = `A. ${gameState.currentOptions[0] || "..."}`;
        document.getElementById("actionB").innerHTML = `B. ${gameState.currentOptions[1] || "..."}`;
        document.getElementById("actionC").innerHTML = `C. ${gameState.currentOptions[2] || "..."}`;
        document.getElementById("actionD").innerHTML = `D. ${gameState.currentOptions[3] || "..."}`;
    }
    
    function addTurn() {
        gameState.turn++;
        updateUI();
        
        // 每 364 回合自動記錄回憶（約半年）
        if(gameState.turn % 364 === 0 && gameState.turn !== lastMemoryTurn) {
            lastMemoryTurn = gameState.turn;
            autoSaveMemory();
        }
        
        if(gameState.turn >= 25552 && !gameState.isGraduated) {
            gameState.isGraduated = true;
            document.getElementById("storyLog").innerHTML += "<br><br>🎓 恭喜完成 25552 回合！你畢業了！";
        }
    }
    
    async function autoSaveMemory() {
        if(!apiKey) return;
        const cfg = API_CONFIG[currentModel];
        const prompt = `請回顧過去半年的遊戲進度，用 2-3 句話總結這段期間發生的重要事件。只輸出總結。`;
        try {
            const response = await fetch(cfg.url(apiKey), {
                method: "POST",
                headers: cfg.headers(apiKey),
                body: JSON.stringify(cfg.buildBody(prompt, "你是回憶記錄員"))
            });
            if(response.ok) {
                const data = await response.json();
                let summary = cfg.parse(data);
                gameState.memories.push({ turn: gameState.turn, date: gameState.gameDateText, summary: summary.substring(0, 200) });
                if(gameState.memories.length > 20) gameState.memories.shift();
                updateUI();
                document.getElementById("storyLog").innerHTML += `<br><br>📝 【回憶】${summary}`;
            }
        } catch(e) {}
    }
    
    function updateDynamicPanel(title, contentHtml) {
        if(title && contentHtml) {
            document.getElementById("dynamicTitle").innerHTML = title;
            document.getElementById("dynamicContent").innerHTML = contentHtml;
            document.getElementById("dynamicPanel").style.display = "block";
        } else {
            document.getElementById("dynamicPanel").style.display = "none";
        }
    }
    
    // ==================== AI 呼叫 ====================
    async function callAI(userInput) {
        if(!apiKey) {
            document.getElementById("errorMsg").innerHTML = "❌ 請先設定 API Key";
            return false;
        }
        
        const cfg = API_CONFIG[currentModel];
        const memoriesText = gameState.memories.map(m => `【${m.date}】${m.summary}`).join("\n");
        
        const systemPrompt = `你是【五月天附中模擬器】的主持人。
玩家：${playerConfig.name}，${playerConfig.gameYear}年入學，${playerConfig.playerGrade}，${playerConfig.school}，社團：${playerConfig.club}。
自訂人設：${playerConfig.personality || "無"}

【過往回憶】：
${memoriesText || "尚無回憶"}

請嚴格按照以下JSON格式輸出：
{
  "storyText": "劇情內容（繁體中文）",
  "vitalityChange": 數字,
  "pressureChange": 數字,
  "clubIntimacyChange": 數字,
  "ashinLikeChange": 數字,
  "monsterLikeChange": 數字,
  "masaLikeChange": 數字,
  "stoneLikeChange": 數字,
  "kuanLikeChange": 數字,
  "earnedCreditChange": 數字,
  "options": ["選項A", "選項B", "選項C", "選項D"],
  "dynamicPanel": { "title": "面板標題", "content": "HTML內容" } // 不需要時設為 null
}`;
        
        const prompt = `當前狀態：活力=${gameState.vitality} 壓力=${gameState.pressure}
時間：${gameState.gameDateText}
玩家行動：${userInput}
請生成接續劇情、數值變化、4個動態選項。`;
        
        try {
            document.getElementById("errorMsg").innerHTML = "⏳ AI 思考中...";
            const response = await fetch(cfg.url(apiKey), { method: "POST", headers: cfg.headers(apiKey), body: JSON.stringify(cfg.buildBody(prompt, systemPrompt)) });
            if(!response.ok) throw new Error(`API錯誤 ${response.status}`);
            const data = await response.json();
            let rawText = cfg.parse(data);
            let jsonMatch = rawText.match(/\{[\s\S]*\}/);
            
            if(jsonMatch) {
                let parsed = JSON.parse(jsonMatch[0]);
                document.getElementById("storyLog").innerHTML += `<br><br>🎭 ${parsed.storyText || "（劇情生成中）"}`;
                
                gameState.vitality = Math.min(100, Math.max(0, gameState.vitality + (parsed.vitalityChange || 0)));
                gameState.pressure = Math.min(100, Math.max(0, gameState.pressure + (parsed.pressureChange || 0)));
                gameState.clubIntimacy = Math.min(100, Math.max(0, gameState.clubIntimacy + (parsed.clubIntimacyChange || 0)));
                gameState.ashinLike = Math.min(100, Math.max(0, gameState.ashinLike + (parsed.ashinLikeChange || 0)));
                gameState.monsterLike = Math.min(100, Math.max(0, gameState.monsterLike + (parsed.monsterLikeChange || 0)));
                gameState.masaLike = Math.min(100, Math.max(0, gameState.masaLike + (parsed.masaLikeChange || 0)));
                gameState.stoneLike = Math.min(100, Math.max(0, gameState.stoneLike = Math.min(100, Math.max(0, gameState.stoneLike + (parsed.stoneLikeChange || 0)));
                gameState.kuanLike = Math.min(100, Math.max(0, gameState.kuanLike + (parsed.kuanLikeChange || 0)));
                gameState.earnedCredit = Math.min(gameState.totalCredit, Math.max(0, gameState.earnedCredit + (parsed.earnedCreditChange || 0)));
                
                if(parsed.options && parsed.options.length >= 4) {
                    gameState.currentOptions = parsed.options;
                }
                
                if(parsed.dynamicPanel && parsed.dynamicPanel.title) {
                    updateDynamicPanel(parsed.dynamicPanel.title, parsed.dynamicPanel.content);
                } else {
                    updateDynamicPanel(null, null);
                }
                
                updateUI();
                addTurn();
                document.getElementById("storyLog").scrollTop = document.getElementById("storyLog").scrollHeight;
                document.getElementById("errorMsg").innerHTML = "";
                return true;
            }
        } catch(e) {
            document.getElementById("errorMsg").innerHTML = `❌ ${e.message}`;
            return false;
        }
    }
    
    async function testAPI() {
        if(!apiKey) { document.getElementById("errorMsg").innerHTML = "❌ 請先設定 API Key"; return; }
        const cfg = API_CONFIG[currentModel];
        try {
            const res = await fetch(cfg.url(apiKey), { method: "GET", headers: cfg.headers(apiKey) });
            if(res.ok || res.status === 400) {
                document.getElementById("errorMsg").innerHTML = `✅ ${cfg.name} 連線成功！`;
            } else {
                document.getElementById("errorMsg").innerHTML = `❌ 連線失敗：${res.status}`;
            }
        } catch(e) {
            document.getElementById("errorMsg").innerHTML = `❌ ${e.message}`;
        }
    }
    
    function saveApi() {
        currentModel = document.getElementById("modelSelect").value;
        apiKey = document.getElementById("apiKeyInput").value.trim();
        if(apiKey) {
            localStorage.setItem("ai_model", currentModel);
            localStorage.setItem("api_key", apiKey);
            document.getElementById("apiStatus").innerHTML = `✅ ${API_CONFIG[currentModel].name} Key 已儲存`;
        }
    }
    
    function startGame() {
        playerConfig.name = document.getElementById("playerName").value || "同學";
        playerConfig.gameYear = parseInt(document.getElementById("gameYear").value);
        playerConfig.playerGrade = document.getElementById("playerGrade").value;
        playerConfig.school = document.getElementById("playerSchool").value;
        playerConfig.club = document.getElementById("playerClub").value;
        playerConfig.relation = document.getElementById("initialRelation").value;
        playerConfig.personality = document.getElementById("playerPersonality").value;
        
        gameState.year = playerConfig.gameYear;
        gameState.academicYear = playerConfig.gameYear;
        gameState.gradeLevel = { "高一":1, "高二":2, "高三":3 }[playerConfig.playerGrade] || 1;
        gameState.gameDateText = `${playerConfig.gameYear}年 秋（${playerConfig.playerGrade}）`;
        
        let baseLike = { "陌生人":0, "聽過名字":3, "點頭之交":6 }[playerConfig.relation];
        gameState.ashinLike = baseLike;
        gameState.monsterLike = baseLike;
        
        document.getElementById("createPanel").classList.add("hidden");
        document.getElementById("gamePanel").classList.remove("hidden");
        updateUI();
        
        document.getElementById("storyLog").innerHTML = `🎸 國立臺灣師範大學附屬高級中學\n\n${playerConfig.gameYear}年，九月。開學典禮剛結束。\n\n你站在穿堂下，手裡握著課表，還不知道教室在哪。\n\n你的附中故事，從這裡開始。`;
    }
    
    function saveGame() { localStorage.setItem("game_save", JSON.stringify({gameState, playerConfig})); alert("存檔完成"); }
    function loadGame() { let s = localStorage.getItem("game_save"); if(s) { let d=JSON.parse(s); gameState=d.gameState; playerConfig=d.playerConfig; updateUI(); document.getElementById("storyLog").innerHTML="📀 讀取存檔完成"; } else alert("無存檔"); }
    function resetGame() { if(confirm("重置遊戲？")) location.reload(); }
    
    document.getElementById("startGameBtn").onclick = startGame;
    document.getElementById("saveApiBtn").onclick = saveApi;
    document.getElementById("testApiBtn").onclick = testAPI;
    document.getElementById("saveBtn").onclick = saveGame;
    document.getElementById("loadBtn").onclick = loadGame;
    document.getElementById("resetBtn").onclick = resetGame;
    document.getElementById("submitFree").onclick = () => {
        let txt = document.getElementById("freeText").value.trim();
        if(txt) callAI(txt);
        document.getElementById("freeText").value = "";
    };
    document.getElementById("actionA").onclick = () => callAI(gameState.currentOptions[0]);
    document.getElementById("actionB").onclick = () => callAI(gameState.currentOptions[1]);
    document.getElementById("actionC").onclick = () => callAI(gameState.currentOptions[2]);
    document.getElementById("actionD").onclick = () => callAI(gameState.currentOptions[3]);
    
    if(apiKey) document.getElementById("apiKeyInput").value = "********";
    if(currentModel) document.getElementById("modelSelect").value = currentModel;
    updateUI();
</script>
</body>
</html>
